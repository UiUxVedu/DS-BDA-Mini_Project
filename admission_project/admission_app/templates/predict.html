{% extends 'base.html' %}

{% block content %}

<div class="card p-4 col-md-7 mx-auto">

    <h4 class="mb-3">Prediction Input</h4>
    <p class="text-muted">Enter academic details and select model</p>

    <form method="POST">
        {% csrf_token %}

        <div class="row g-3">

            <div class="col-md-6">
                <label>GRE Score</label>
                <input type="number" name="gre" class="form-control" required>
            </div>

            <div class="col-md-6">
                <label>TOEFL Score</label>
                <input type="number" name="toefl" class="form-control" required>
            </div>

            <div class="col-md-6">
                <label>CGPA</label>
                <input type="number" step="0.1" name="cgpa" class="form-control" required>
            </div>

            <div class="col-md-6">
                <label>SOP</label>
                <input type="number" step="0.1" name="sop" class="form-control" required>
            </div>

            <div class="col-md-6">
                <label>LOR</label>
                <input type="number" step="0.1" name="lor" class="form-control" required>
            </div>

            <div class="col-md-6">
                <label>Research</label>
                <select name="research" class="form-control">
                    <option value="1">Yes</option>
                    <option value="0">No</option>
                </select>
            </div>

            <div class="col-12">
                <label>Model Selection</label>
                <select name="model" class="form-control">
                    <option value="best">Auto Select Best Model</option>
                    <option value="Linear Regression">Linear Regression</option>
                    <option value="Decision Tree">Decision Tree</option>
                    <option value="Random Forest">Random Forest</option>
                    <option value="SVR">Support Vector Regression</option>
                    <option value="KNN">KNN</option>
                </select>
            </div>

        </div>

        <button class="btn btn-primary w-100 mt-4">
            Predict Admission Chance
        </button>

    </form>

</div>

{% endblock %}
