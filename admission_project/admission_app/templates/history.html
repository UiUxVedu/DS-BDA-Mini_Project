{% extends 'base.html' %}

{% block content %}

<h4 class="mb-4">Model Training History</h4>

<div class="card p-4">
    <table class="table table-hover">
        <thead>
            <tr>
                <th>Model</th>
                <th>R²</th>
                <th>MSE</th>
                <th>MAE</th>
                <th>Date</th>
            </tr>
        </thead>

        <tbody>
            {% for h in history %}
            <tr>
                <td>{{ h.model_name }}</td>
                <td>{{ h.r2|floatformat:3 }}</td>
                <td>{{ h.mse|floatformat:3 }}</td>
                <td>{{ h.mae|floatformat:3 }}</td>
                <td>{{ h.created_at }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>

{% endblock %}
